<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
<alias>
  <family>sans-serif</family>
  <prefer>
    <family>HasklugNerdFont</family>
  </prefer>
</alias>
<alias>
  <family>serif</family>
  <prefer>
    <family>HasklugNerdFont</family>
  </prefer>
</alias>
<alias>
  <family>monospace</family>
  <prefer>
  <family>HasklugNerdFontMono</family>

  </prefer>
</alias>
<alias>
  <family>emoji</family>
  <prefer>
    <family>HasklugNerdFont</family>
  </prefer>
</alias>
</fontconfig>
