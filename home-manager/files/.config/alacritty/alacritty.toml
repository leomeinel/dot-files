# Heavily inspired by:
# - https://github.com/olimorris/onedarkpro.nvim/blob/main/extras/alacritty/onedarkpro_onedark.toml

[general]
live_config_reload = true

[colors.primary]
background  = "#282c34"
foreground  = "#abb2bf"

[colors.normal]
black       = "#282c34"
red         = "#e06c75"
green       = "#98c379"
yellow      = "#e5c07b"
blue        = "#61afef"
magenta     = "#c678dd"
cyan        = "#56b6c2"
white       = "#abb2bf"

[colors.bright]
black       = "#3e4451"
red         = "#e9969d"
green       = "#b3d39c"
yellow      = "#edd4a6"
blue        = "#8fc6f4"
magenta     = "#d7a1e7"
cyan        = "#7bc6d0"
white       = "#c8cdd5"

[colors.cursor]
text        = "CellBackground"
cursor      = "CellForeground"

[colors.selection]
text        = "CellForeground"
background  = "#5c6370"

[window]
padding = { x = 0, y = 0 }
decorations = "none"
decorations_theme_variant = "None"
opacity = 1.0
startup_mode = "Maximized"
title = "Alacritty"
dynamic_title = false
class = { instance = "Alacritty", general = "Alacritty" }

[scrolling]
history = 10000
multiplier = 3

[mouse]
hide_when_typing = true

[font]
size = 10
normal = { family = "HasklugNerdFontMono", style = "Regular" }
bold = { family = "HasklugNerdFontMono", style = "Bold" }
italic = { family = "HasklugNerdFontMono", style = "Italic" }
bold_italic = { family = "HasklugNerdFontMono", style = "Bold Italic" }

[env]
TERM = "alacritty"
